
services:
  sic-mysql:
    image: mysql:8.0
    container_name: sic-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass_123
      - MYSQL_DATABASE=${DB_DATABASE:-sic}
      - MYSQL_USER=${DB_USERNAME:-sic_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-sic_pass_123}
      - TZ=${TZ:-America/Recife}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sic.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  sic-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sic-app
    restart: unless-stopped
    depends_on:
      sic-mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=${DB_HOST:-sic-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-sic}
      - DB_USERNAME=${DB_USERNAME:-sic_user}
      - DB_PASSWORD=${DB_PASSWORD:-sic_pass_123}
      - TZ=${TZ:-America/Recife}
    volumes:
      - ./sic:/var/www/html
      - doc_veiculos:/var/www/html/doc_veiculos
      - imagens_notificacoes:/var/www/html/imagens_notificacoes
    networks:
      - backend

volumes:
  doc_veiculos:
  imagens_notificacoes:
  mysql_data:

networks:
  backend:
    driver: bridge
